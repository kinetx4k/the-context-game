<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Engine Pro - Infinite Universe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #010103;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        .ui-panel {
            background: rgba(8, 8, 16, 0.92);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.9);
        }
        .hotbar-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hotbar-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-5px);
        }
        .hotbar-btn.active {
            background: #3b82f6;
            border-color: #60a5fa;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
        #top-menu-content {
            display: none;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .dropdown:hover #top-menu-content {
            display: block;
        }
        .hotbar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            padding: 12px;
            z-index: 100;
        }
        #object-editor {
            position: absolute;
            top: 80px;
            right: 20px;
            width: 280px;
            padding: 20px;
            z-index: 100;
            display: none;
        }
        #stats {
            position: absolute;
            bottom: 30px;
            left: 30px;
            padding: 12px 20px;
            z-index: 90;
        }
        .nebula-glow {
            pointer-events: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(50, 0, 100, 0.05) 0%, transparent 80%);
        }
    </style>
</head>
<body>

    <div class="nebula-glow"></div>

    <!-- Menü oben links -->
    <div class="absolute top-5 left-5 dropdown z-[200]">
        <button class="ui-panel px-6 py-3 font-bold flex items-center gap-2 hover:bg-gray-800 transition-colors">
            <span>☰ Universe Control</span>
        </button>
        <div id="top-menu-content" class="ui-panel mt-2 p-4 w-64 space-y-4">
            <div class="space-y-2">
                <p class="text-[0.65rem] uppercase text-gray-500 font-bold">Presets</p>
                <button onclick="spawnSolarSystem()" class="w-full text-left p-2 hover:bg-white/10 rounded text-xs">Full Solar System</button>
                <button onclick="spawnTripleSystem()" class="w-full text-left p-2 hover:bg-white/10 rounded text-xs">Stable Triple Star</button>
                <button onclick="spawnAtomicSystem()" class="w-full text-left p-2 hover:bg-white/10 rounded text-xs">Atomic BH System</button>
                <button onclick="spawnGalaxySpiral()" class="w-full text-left p-2 hover:bg-white/10 rounded text-xs">Galaxy Spiral (Large)</button>
            </div>
            
            <div class="space-y-2 border-t border-white/10 pt-3">
                <p class="text-[0.65rem] uppercase text-gray-500 font-bold">Simulation Settings</p>
                <div class="flex items-center justify-between">
                    <span class="text-xs">Time Flow</span>
                    <button id="pause-btn" onclick="togglePause()" class="text-[10px] bg-blue-600 px-2 py-1 rounded">PAUSE</button>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-xs">Collision Mode</span>
                    <select id="collision-mode" class="bg-gray-900 text-[10px] p-1 rounded border border-white/20">
                        <option value="merge">Merge Objects</option>
                        <option value="bounce">Bounce (Elastic)</option>
                    </select>
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-xs">Universe Limit</label>
                    <span class="text-[10px] text-gray-400">10000 Units</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2 border-t border-white/10 pt-3">
                <button onclick="clearSystem()" class="p-2 rounded bg-red-900/40 hover:bg-red-800/60 text-[10px] border border-red-700/50 uppercase font-bold">Wipe Universe</button>
                <button onclick="resetView()" class="p-2 rounded bg-gray-800 hover:bg-gray-700 text-[10px] uppercase font-bold text-center">Center View</button>
            </div>
        </div>
    </div>

    <!-- Hotbar unten -->
    <div class="hotbar ui-panel">
        <button onclick="setObjectType('planet')" id="hot-planet" class="hotbar-btn active px-4 py-2 rounded-lg flex flex-col items-center gap-1">
            <div class="w-3 h-3 rounded-full bg-blue-400"></div>
            <span class="text-[10px] font-bold">PLANET</span>
        </button>
        <button onclick="setObjectType('star')" id="hot-star" class="hotbar-btn px-4 py-2 rounded-lg flex flex-col items-center gap-1">
            <div class="w-4 h-4 rounded-full bg-yellow-400 shadow-[0_0_10px_rgba(253,224,71,0.8)]"></div>
            <span class="text-[10px] font-bold">STAR</span>
        </button>
        <button onclick="setObjectType('giant')" id="hot-giant" class="hotbar-btn px-4 py-2 rounded-lg flex flex-col items-center gap-1">
            <div class="w-5 h-5 rounded-full bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.8)]"></div>
            <span class="text-[10px] font-bold">GIANT</span>
        </button>
        <button onclick="setObjectType('comet')" id="hot-comet" class="hotbar-btn px-4 py-2 rounded-lg flex flex-col items-center gap-1">
            <div class="w-2 h-2 rounded-full bg-cyan-200 rotate-45 border-r-4 border-blue-400 shadow-[0_0_8px_rgba(34,211,238,1)]"></div>
            <span class="text-[10px] font-bold">COMET</span>
        </button>
        <button onclick="setObjectType('blackhole')" id="hot-blackhole" class="hotbar-btn px-4 py-2 rounded-lg flex flex-col items-center gap-1">
            <div class="w-3 h-3 rounded-full bg-black border border-purple-500"></div>
            <span class="text-[10px] font-bold">BH</span>
        </button>
    </div>

    <!-- Editor rechts -->
    <div id="object-editor" class="ui-panel space-y-4">
        <div class="flex justify-between items-center border-b border-gray-700 pb-2">
            <h2 class="font-bold text-blue-400">Object Settings</h2>
            <button onclick="deselectObject()" class="text-gray-500 hover:text-white">✕</button>
        </div>
        <div class="space-y-3">
            <div>
                <label class="text-[10px] block text-gray-500 uppercase font-bold">Body Mass</label>
                <input type="number" id="edit-mass" class="w-full bg-gray-900 border border-gray-700 rounded p-1 text-sm outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="text-[10px] block text-gray-500 uppercase font-bold">Visual Radius</label>
                <input type="number" id="edit-radius" class="w-full bg-gray-900 border border-gray-700 rounded p-1 text-sm outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="text-[10px] block text-gray-500 uppercase font-bold">Color Tint</label>
                <input type="color" id="edit-color" class="w-full h-8 bg-gray-900 border border-gray-700 rounded cursor-pointer">
            </div>
            <div class="flex gap-2">
                <button onclick="focusOnObject()" class="flex-1 p-2 rounded bg-blue-900/40 text-[10px] border border-blue-700/50 uppercase font-bold">Follow</button>
                <button onclick="explodeSelected()" class="flex-1 p-2 rounded bg-orange-900/40 text-[10px] border border-orange-700/50 uppercase font-bold">Explode</button>
            </div>
        </div>
        <button onclick="deleteSelected()" class="w-full p-2 mt-2 rounded bg-red-900/40 text-[10px] border border-red-700/50 uppercase font-bold hover:bg-red-800">Destroy</button>
    </div>

    <!-- Stats unten links -->
    <div id="stats" class="ui-panel flex gap-8">
        <div class="flex flex-col">
            <span class="text-[0.6rem] text-gray-500 uppercase font-bold tracking-widest">Active Bodies</span>
            <span id="stat-count" class="text-xl font-black text-white">0</span>
        </div>
        <div class="flex flex-col">
            <span class="text-[0.6rem] text-gray-500 uppercase font-bold tracking-widest">Universal Mass</span>
            <span id="stat-mass" class="text-xl font-black text-blue-500">0</span>
        </div>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        /**
         * GLOBALE KONFIGURATION
         */
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const STAT_COUNT = document.getElementById('stat-count');
        const STAT_MASS = document.getElementById('stat-mass');
        const EDITOR_PANEL = document.getElementById('object-editor');
        const EDIT_MASS = document.getElementById('edit-mass');
        const EDIT_RADIUS = document.getElementById('edit-radius');
        const EDIT_COLOR = document.getElementById('edit-color');
        const COLLISION_MODE = document.getElementById('collision-mode');
        const PAUSE_BTN = document.getElementById('pause-btn');

        let G = 1.0; 
        let timeScale = 1.0;
        let isPaused = false;
        let objects = [];
        let nebulae = [];
        let currentType = 'planet';
        let isDragging = false, isPanning = false;
        let selectedObject = null;
        let trackedObject = null;
        let startPos = { x: 0, y: 0 }, currentMousePos = { x: 0, y: 0 };
        let camera = { x: 0, y: 0, zoom: 1 };
        
        const UNIVERSE_LIMIT = 10000; // Größere Grenze des Universums

        const types = {
            planet: { mass: 100, radius: 12, color: '#4a90e2', trailColor: 'rgba(74, 144, 226, 0.1)' },
            star: { mass: 40000, radius: 45, color: '#f5a623', trailColor: 'rgba(245, 166, 35, 0.1)' },
            giant: { mass: 150000, radius: 80, color: '#ff4444', trailColor: 'rgba(255, 68, 68, 0.1)' },
            comet: { mass: 5, radius: 4, color: '#99ffff', trailColor: 'rgba(153, 255, 255, 0.4)' },
            blackhole: { mass: 500000, radius: 25, color: '#000000', trailColor: 'rgba(120, 60, 255, 0.2)' },
            dust: { mass: 0.1, radius: 1, color: '#888888', trailColor: 'transparent' }
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (objects.length === 0) resetView();
        }
        window.addEventListener('resize', resize);
        resize();

        function setObjectType(type) {
            currentType = type;
            document.querySelectorAll('.hotbar-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`hot-${type}`).classList.add('active');
        }

        function togglePause() {
            isPaused = !isPaused;
            PAUSE_BTN.innerText = isPaused ? 'RESUME' : 'PAUSE';
            PAUSE_BTN.classList.toggle('bg-red-600', isPaused);
            PAUSE_BTN.classList.toggle('bg-blue-600', !isPaused);
        }

        function clearSystem() { objects = []; nebulae = []; deselectObject(); trackedObject = null; }
        function resetView() { camera.zoom = 1; camera.x = canvas.width / 2; camera.y = canvas.height / 2; trackedObject = null; }
        function screenToWorld(x, y) { return { x: (x - camera.x) / camera.zoom, y: (y - camera.y) / camera.zoom }; }

        /**
         * SUPERNOVA UND NEBEL EFFEKTE (WIE AUF DEN BILDERN)
         */
        class NebulaCloud {
            constructor(x, y, baseColor) {
                this.x = x; this.y = y;
                this.radius = 10;
                this.maxRadius = 300 + Math.random() * 600;
                this.opacity = 0.8;
                this.expansion = 0.4 + Math.random() * 0.6;
                // Farben wie beim Crab Nebula (Cyan, Orange, Rot Mischung)
                this.colors = ['#00ffff', '#ff6600', '#ff0066', '#4400ff'];
                this.color = this.colors[Math.floor(Math.random() * this.colors.length)];
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.01;
            }
            update() {
                if (!isPaused) {
                    if (this.radius < this.maxRadius) this.radius += this.expansion;
                    this.opacity -= 0.0002;
                    this.rotation += this.rotSpeed;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                const grad = ctx.createRadialGradient(0, 0, this.radius * 0.1, 0, 0, this.radius);
                grad.addColorStop(0, this.color + '00');
                grad.addColorStop(0.2, this.color + Math.floor(Math.min(1, Math.max(0, this.opacity)) * 255).toString(16).padStart(2, '0'));
                grad.addColorStop(0.5, '#ffffff22');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                // Unregelmäßige Wolkenform
                ctx.beginPath();
                for(let i=0; i<8; i++) {
                    const a = (i/8) * Math.PI * 2;
                    const r = this.radius * (0.8 + Math.random() * 0.4);
                    ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        class CelestialBody {
            constructor(x, y, vx, vy, type, options = {}) {
                const config = types[type];
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.mass = options.mass || config.mass;
                this.radius = options.radius || config.radius;
                this.color = options.color || config.color;
                this.type = type;
                this.trail = [];
                this.destroyed = false;
                this.features = [];
                if (type === 'planet') {
                    for(let i=0; i<8; i++) this.features.push({rx: (Math.random()-0.5)*1.6, ry: (Math.random()-0.5)*1.6, s: Math.random()*0.4+0.1, op: Math.random()*0.35});
                }
            }
            update() {
                if (isPaused) return;
                this.x += this.vx * timeScale;
                this.y += this.vy * timeScale;
                
                // Universum Limit Check (Abprallen)
                const dist = Math.hypot(this.x, this.y);
                if (dist > UNIVERSE_LIMIT) {
                    const nx = this.x / dist;
                    const ny = this.y / dist;
                    const dot = this.vx * nx + this.vy * ny;
                    this.vx -= 2 * dot * nx;
                    this.vy -= 2 * dot * ny;
                    // Zurück in die Grenze schieben
                    this.x = nx * (UNIVERSE_LIMIT - 1);
                    this.y = ny * (UNIVERSE_LIMIT - 1);
                }

                if (this.type !== 'dust') {
                    this.trail.push({x: this.x, y: this.y});
                    if (this.trail.length > 300) this.trail.shift();
                }
            }
            draw() {
                if (selectedObject === this) {
                    ctx.beginPath(); ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3/camera.zoom;
                    ctx.arc(this.x, this.y, this.radius + 8/camera.zoom, 0, Math.PI * 2); ctx.stroke();
                }
                if (this.trail.length > 1) {
                    ctx.beginPath(); ctx.strokeStyle = types[this.type].trailColor || 'rgba(255,255,255,0.05)'; 
                    ctx.lineWidth = (this.type === 'comet' ? 2 : 1.2)/camera.zoom;
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for(let i=1; i<this.trail.length; i++) ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    ctx.stroke();
                }
                
                if (this.type === 'blackhole') { this.drawBlackHole(); return; }

                // Stärkeres Glühen für Meteoriten/Comets
                const gSize = (this.type === 'star' || this.type === 'giant') ? 5 : (this.type === 'comet' ? 4 : 1.6);
                const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * gSize);
                glow.addColorStop(0, this.color);
                glow.addColorStop(0.2, this.color);
                glow.addColorStop(1, 'transparent');
                
                ctx.save();
                if (this.type === 'comet') {
                    ctx.shadowBlur = 20 / camera.zoom;
                    ctx.shadowColor = this.color;
                }
                ctx.globalAlpha = (this.type === 'star' || this.type === 'giant') ? 0.6 : (this.type === 'comet' ? 0.8 : 0.25); 
                ctx.fillStyle = glow;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius * gSize, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1.0;

                ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
                ctx.restore();

                if (this.features.length > 0) {
                    ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.clip();
                    ctx.fillStyle = 'rgba(0,0,0,0.4)';
                    this.features.forEach(f => { 
                        ctx.beginPath(); ctx.globalAlpha = f.op; 
                        ctx.arc(this.x + f.rx*this.radius, this.y + f.ry*this.radius, this.radius*f.s, 0, Math.PI*2); ctx.fill(); 
                    });
                    ctx.restore();
                }
            }
            drawBlackHole() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(Date.now()*0.0008);
                const g = ctx.createRadialGradient(0,0,this.radius,0,0,this.radius*8);
                g.addColorStop(0, '#000'); g.addColorStop(0.1, '#ff6600'); g.addColorStop(0.4, '#4400ff'); g.addColorStop(1, 'transparent');
                ctx.fillStyle = g; ctx.scale(2.5, 0.4); ctx.beginPath(); ctx.arc(0,0,this.radius*8,0,Math.PI*2); ctx.fill();
                ctx.restore(); ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1/camera.zoom;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius+1, 0, Math.PI*2); ctx.stroke();
            }
        }

        function triggerSupernova(x, y, color) {
            // Mehrere Wolken für den Crab-Nebula Look
            for(let i=0; i<15; i++) {
                nebulae.push(new NebulaCloud(x + (Math.random()-0.5)*100, y + (Math.random()-0.5)*100, color));
            }
            for(let i=0; i<80; i++) {
                const ang = Math.random()*Math.PI*2, spd = Math.random()*25 + 5;
                objects.push(new CelestialBody(x, y, Math.cos(ang)*spd, Math.sin(ang)*spd, 'dust', { color: color }));
            }
        }

        /**
         * NEUE PRESETS
         */
        function spawnSolarSystem() {
            clearSystem();
            const sun = new CelestialBody(0, 0, 0, 0, 'star', { mass: 120000, radius: 85, color: '#ffcc33' });
            objects.push(sun);
            const planets = [
                { d: 250, m: 15, r: 6, c: '#a5a5a5' }, { d: 450, m: 90, r: 12, c: '#efb35d' },
                { d: 700, m: 100, r: 13, c: '#2271b3' }, { d: 1000, m: 60, r: 9, c: '#e27b58' },
                { d: 1800, m: 2000, r: 42, c: '#d39c7e' }, { d: 2600, m: 1500, r: 36, c: '#c5ab6e' },
                { d: 3400, m: 800, r: 24, c: '#b5e3e3' }, { d: 4200, m: 800, r: 23, c: '#6081ff' }
            ];
            planets.forEach(p => {
                const a = Math.random()*Math.PI*2, s = Math.sqrt((G*sun.mass)/p.d);
                objects.push(new CelestialBody(Math.cos(a)*p.d, Math.sin(a)*p.d, Math.sin(a)*s, -Math.cos(a)*s, 'planet', { mass: p.mass, radius: p.r, color: p.c }));
            });
            // Asteroiden Gürtel
            for(let i=0; i<300; i++) {
                const d = 1300 + Math.random()*200, a = Math.random()*Math.PI*2, s = Math.sqrt((G*sun.mass)/d);
                objects.push(new CelestialBody(Math.cos(a)*d, Math.sin(a)*d, Math.sin(a)*s, -Math.cos(a)*s, 'dust', { color: '#777' }));
            }
            camera.zoom = 0.15;
        }

        function spawnTripleSystem() {
            clearSystem();
            // Zentrale Doppelsterne
            const d = 150, m = 50000, s = Math.sqrt((G*m)/(d*2));
            objects.push(new CelestialBody(-d, 0, 0, s, 'star', { mass: m, color: '#ff3366' }));
            objects.push(new CelestialBody(d, 0, 0, -s, 'star', { mass: m, color: '#33ffcc' }));
            // Dritter ferner Stern
            const d3 = 1000, m3 = 20000, s3 = Math.sqrt((G*(m*2))/d3);
            objects.push(new CelestialBody(0, d3, s3, 0, 'star', { mass: m3, color: '#ffff33' }));
            camera.zoom = 0.4;
        }

        function spawnAtomicSystem() {
            clearSystem();
            const bh = new CelestialBody(0,0,0,0, 'blackhole', { mass: 800000 });
            objects.push(bh);
            // Sterne wie Elektronenbahnen
            for(let i=0; i<6; i++) {
                const dist = 400 + i * 150;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.sqrt((G*bh.mass)/dist);
                const vx = Math.sin(angle) * speed;
                const vy = -Math.cos(angle) * speed;
                objects.push(new CelestialBody(Math.cos(angle)*dist, Math.sin(angle)*dist, vx, vy, 'star', { 
                    mass: 5000, color: `hsl(${i*60}, 100%, 70%)`, radius: 15 
                }));
            }
            camera.zoom = 0.3;
        }

        function spawnGalaxySpiral() {
            clearSystem();
            const core = new CelestialBody(0,0,0,0, 'blackhole', { mass: 1000000 });
            objects.push(core);
            for(let i=0; i<600; i++) {
                const angle = i * 0.08, dist = 400 + i * 8 + Math.random()*150;
                const s = Math.sqrt((G*core.mass)/dist);
                objects.push(new CelestialBody(Math.cos(angle)*dist, Math.sin(angle)*dist, Math.sin(angle)*s, -Math.cos(angle)*s, 'dust', { color: `hsl(${i%360}, 80%, 70%)` }));
            }
            camera.zoom = 0.08;
        }

        /**
         * PHYSIK ENGINE
         */
        function applyPhysics() {
            if (isPaused) return;
            
            // Objekte berechnen
            for(let i=0; i<objects.length; i++) {
                const b1 = objects[i];
                for(let j=i+1; j<objects.length; j++) {
                    const b2 = objects[j];
                    const dx = b2.x-b1.x, dy = b2.y-b1.y, d2 = dx*dx+dy*dy, d = Math.sqrt(d2);
                    
                    if (d < b1.radius+b2.radius) {
                        handleCollision(b1, b2);
                        continue;
                    }

                    const f = (G*b1.mass*b2.mass)/d2;
                    const ax = (f*dx/d)/b1.mass, ay = (f*dy/d)/b1.mass;
                    
                    b1.vx += ax * timeScale; b1.vy += ay * timeScale;
                    b2.vx -= (ax*b1.mass/b2.mass) * timeScale; 
                    b2.vy -= (ay*b1.mass/b2.mass) * timeScale;

                    if ((b1.type === 'blackhole' || b2.type === 'blackhole') && d < 600) {
                        const bh = b1.type === 'blackhole' ? b1 : b2, target = b1.type === 'blackhole' ? b2 : b1;
                        if (target.type !== 'dust') {
                            const dr = 3.0 * timeScale;
                            if (target.mass > dr) { 
                                target.mass -= dr; bh.mass += dr; 
                                target.radius = Math.max(2, target.radius - 0.01); 
                            } else target.destroyed = true;
                        }
                    }
                }
            }

            // Nebel-Einsaugen berechnen
            nebulae.forEach(n => {
                objects.forEach(bh => {
                    if (bh.type === 'blackhole') {
                        const dx = bh.x - n.x, dy = bh.y - n.y;
                        const d2 = dx*dx + dy*dy, d = Math.sqrt(d2);
                        if (d < 1000) { // Saug-Reichweite
                            const force = 3.0 * (1 - d/1000);
                            n.x += (dx/d) * force;
                            n.y += (dy/d) * force;
                            // Wenn im schwarzen Loch, dann weg
                            if (d < bh.radius) n.opacity = 0;
                        }
                    }
                });
            });

            objects = objects.filter(o => !o.destroyed);
            nebulae = nebulae.filter(n => n.opacity > 0);
            nebulae.forEach(n => n.update());
        }

        function handleCollision(b1, b2) {
            const mode = COLLISION_MODE.value;
            if (mode === 'bounce') {
                const nx = (b2.x - b1.x) / (b1.radius + b2.radius);
                const ny = (b2.y - b1.y) / (b1.radius + b2.radius);
                const p = 2 * (b1.vx * nx + b1.vy * ny - b2.vx * nx - b2.vy * ny) / (b1.mass + b2.mass);
                b1.vx -= p * b2.mass * nx; b1.vy -= p * b2.mass * ny;
                b2.vx += p * b1.mass * nx; b2.vy += p * b1.mass * ny;
                return;
            }

            const winner = b1.mass >= b2.mass ? b1 : b2, loser = b1.mass >= b2.mass ? b2 : b1;
            if (winner.type === 'blackhole') { winner.mass += loser.mass; loser.destroyed = true; return; }
            
            // Supernova bei schweren Sternen / Giants
            if ((winner.type === 'star' || winner.type === 'giant') && loser.mass > 200) {
                triggerSupernova(loser.x, loser.y, loser.color);
            }
            
            const tm = winner.mass + loser.mass;
            winner.vx = (winner.vx*winner.mass + loser.vx*loser.mass)/tm;
            winner.vy = (winner.vy*winner.mass + loser.vy*loser.mass)/tm;
            winner.mass = tm;
            winner.radius = Math.max(winner.radius, Math.pow(tm, 1/3)*2.8);
            loser.destroyed = true;
            if(selectedObject === loser) deselectObject();
            if(trackedObject === loser) trackedObject = winner;
        }

        /**
         * RENDERING LOOP
         */
        function mainLoop() {
            applyPhysics();
            objects.forEach(o => o.update());

            if (trackedObject) {
                camera.x = canvas.width/2 - trackedObject.x * camera.zoom;
                camera.y = canvas.height/2 - trackedObject.y * camera.zoom;
            }

            STAT_COUNT.innerText = objects.filter(o => o.type !== 'dust').length;
            STAT_MASS.innerText = Math.round(objects.reduce((s,o) => s+o.mass, 0)).toLocaleString();

            ctx.setTransform(1,0,0,1,0,0);
            ctx.clearRect(0,0,canvas.width, canvas.height);
            
            ctx.translate(camera.x, camera.y);
            ctx.scale(camera.zoom, camera.zoom);

            // Universum Grenze Zeichnen
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 10/camera.zoom;
            ctx.arc(0, 0, UNIVERSE_LIMIT, 0, Math.PI*2);
            ctx.stroke();

            nebulae.forEach(n => n.draw());
            objects.forEach(o => o.draw());

            if (isDragging) {
                const wS = screenToWorld(startPos.x, startPos.y), wE = screenToWorld(currentMousePos.x, currentMousePos.y);
                ctx.beginPath(); ctx.setLineDash([6,6]); ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.moveTo(wS.x, wS.y);
                ctx.lineTo(wE.x, wE.y); ctx.stroke(); ctx.setLineDash([]);
            }

            requestAnimationFrame(mainLoop);
        }

        /**
         * INPUTS
         */
        canvas.addEventListener('mousedown', (e) => {
            const w = screenToWorld(e.clientX, e.clientY);
            if (e.button === 0) {
                let f = objects.find(o => o.type !== 'dust' && Math.hypot(o.x-w.x, o.y-w.y) < o.radius + 15/camera.zoom);
                if (f) selectObject(f); 
                else { isDragging = true; startPos = {x:e.clientX, y:e.clientY}; currentMousePos = {x:e.clientX, y:e.clientY}; deselectObject(); }
            } else if (e.button === 2) { isPanning = true; startPos = {x:e.clientX, y:e.clientY}; }
        });
        window.addEventListener('mousemove', (e) => {
            if (isDragging) currentMousePos = {x:e.clientX, y:e.clientY};
            if (isPanning) { camera.x += e.clientX - startPos.x; camera.y += e.clientY - startPos.y; startPos = {x:e.clientX, y:e.clientY}; trackedObject = null; }
        });
        window.addEventListener('mouseup', (e) => {
            if (e.button === 0 && isDragging) {
                const wS = screenToWorld(startPos.x, startPos.y), wE = screenToWorld(e.clientX, e.clientY);
                objects.push(new CelestialBody(wS.x, wS.y, (wS.x-wE.x)*0.06, (wS.y-wE.y)*0.06, currentType));
                isDragging = false;
            }
            isPanning = false;
        });
        canvas.addEventListener('wheel', (e) => {
            const f = Math.pow(1.1, -e.deltaY/150), b = screenToWorld(e.clientX, e.clientY);
            camera.zoom = Math.max(0.0001, Math.min(50, camera.zoom * f));
            const a = screenToWorld(e.clientX, e.clientY);
            camera.x += (a.x - b.x) * camera.zoom; camera.y += (a.y - b.y) * camera.zoom;
            e.preventDefault();
        }, { passive: false });
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        function selectObject(o) { selectedObject = o; EDITOR_PANEL.style.display = 'block'; EDIT_MASS.value = Math.round(o.mass); EDIT_RADIUS.value = Math.round(o.radius); EDIT_COLOR.value = o.color; }
        function deselectObject() { selectedObject = null; EDITOR_PANEL.style.display = 'none'; }
        function deleteSelected() { if(selectedObject) selectedObject.destroyed = true; deselectObject(); }
        function focusOnObject() { if(selectedObject) trackedObject = selectedObject; }
        function explodeSelected() { if(selectedObject) { triggerSupernova(selectedObject.x, selectedObject.y, selectedObject.color); selectedObject.destroyed = true; deselectObject(); } }

        [EDIT_MASS, EDIT_RADIUS, EDIT_COLOR].forEach(el => el.addEventListener('input', () => { if(selectedObject) { selectedObject.mass = +EDIT_MASS.value; selectedObject.radius = +EDIT_RADIUS.value; selectedObject.color = EDIT_COLOR.value; } }));

        mainLoop();
    </script>
</body>
</html>
