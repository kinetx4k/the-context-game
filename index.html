<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Maze - Find the Light</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none; /* Hide the default cursor */
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            user-select: none;
        }

        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 20px 40px;
            border: 2px solid #333;
            border-radius: 10px;
            text-align: center;
            transition: opacity 0.5s;
            z-index: 100;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        #tutorial {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        #level-indicator {
            font-size: 1.5rem;
            font-weight: bold;
            color: #444;
        }

        #ability-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1rem;
            text-align: center;
            pointer-events: none;
        }

        .sonar-ready { color: #00FF00; font-weight: bold; }
        .sonar-charging { color: #666; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="level-indicator">Level 1</div>
    </div>

    <div id="ability-bar"></div>

    <div id="message-box">
        <div id="tutorial">
            <h2>Welcome to the Darkness</h2>
            <p>Move your mouse to the <strong>green dot</strong> at the bottom right.</p>
            <p>The walls are invisible. If you touch one, you die.</p>
            <p>A <strong>red splat</strong> marks your mistakes.</p>
            <p style="color: #4CAF50;">Move your mouse here now to start.</p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        /**
         * GAME LOGIC "DARK MAZE"
         * A game about patience and spatial memory.
         */

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelIndicator = document.getElementById('level-indicator');
        const messageBox = document.getElementById('message-box');
        const tutorialText = document.getElementById('tutorial');
        const abilityBar = document.getElementById('ability-bar');

        // Game State
        let currentLevel = 0;
        let isDead = false;
        let gameStarted = false;
        let levelCleared = false; 
        let mousePos = { x: 0, y: 0 };
        let splats = []; 
        let walls = []; 
        let goal = { x: 0, y: 0, radius: 15 };
        let startZone = { x: 50, y: 50, radius: 40 };

        // Ability State: Sonar
        let sonarUnlocked = false;
        let sonarActive = false;
        let sonarRadius = 0;
        let sonarCooldown = 0; // Cooldown timer in frames
        const SONAR_MAX_RADIUS = 600;
        const SONAR_SPEED = 10;
        const SONAR_COOLDOWN_TIME = 180; // 3 seconds at 60fps
        let wallAlphaState = []; // Stores individual alpha for wall glowing

        // Configuration
        const SPLAT_RADIUS = 8;
        const GOAL_COLOR = '#00FF00';
        const SPLAT_COLOR = 'rgba(200, 0, 0, 0.7)';

        /**
         * Initializes Level Data
         */
        const levels = [
            {
                name: "The Beginning",
                walls: [
                    { x: 0, y: 150, w: 0.7, h: 0.1 }, 
                    { x: 0.3, y: 0.4, w: 0.7, h: 0.1 } 
                ]
            },
            {
                name: "Sonar Echoes",
                walls: [
                    { x: 0, y: 0.2, w: 0.8, h: 0.05 },
                    { x: 0.2, y: 0.5, w: 0.8, h: 0.05 },
                    { x: 0, y: 0.8, w: 0.8, h: 0.05 }
                ]
            },
            {
                name: "The Bottleneck",
                walls: [
                    { x: 0, y: 0, w: 1, h: 0.35 },
                    { x: 0, y: 0.65, w: 1, h: 0.35 },
                    { x: 0.4, y: 0.35, w: 0.2, h: 0.15 }
                ]
            },
            {
                name: "Zig-Zag",
                walls: [
                    { x: 0.2, y: 0, w: 0.05, h: 0.7 },
                    { x: 0.4, y: 0.3, w: 0.05, h: 0.7 },
                    { x: 0.6, y: 0, w: 0.05, h: 0.7 },
                    { x: 0.8, y: 0.3, w: 0.05, h: 0.7 }
                ]
            },
            {
                name: "The Labyrinth",
                walls: [
                    { x: 0.1, y: 0, w: 0.02, h: 0.8 },
                    { x: 0.1, y: 0.8, w: 0.4, h: 0.02 },
                    { x: 0.3, y: 0.2, w: 0.02, h: 0.6 },
                    { x: 0.3, y: 0.2, w: 0.5, h: 0.02 },
                    { x: 0.5, y: 0.4, w: 0.5, h: 0.02 },
                    { x: 0.7, y: 0.4, w: 0.02, h: 0.4 },
                    { x: 0.5, y: 0.8, w: 0.4, h: 0.02 }
                ]
            }
        ];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            setupLevel();
        }

        function setupLevel() {
            if (currentLevel >= levels.length) {
                showVictory();
                return;
            }

            const lvl = levels[currentLevel];
            levelIndicator.innerText = `Level ${currentLevel + 1}: ${lvl.name}`;
            
            // Unlock sonar starting from level 2 (index 1)
            if (currentLevel >= 1) {
                sonarUnlocked = true;
                abilityBar.innerHTML = '<span class="sonar-ready">Sonar Ready: [Right Click]</span>';
            } else {
                sonarUnlocked = false;
                abilityBar.innerHTML = '';
            }

            const rawWalls = lvl.walls.map(w => ({
                x: w.x * canvas.width,
                y: w.y * canvas.height,
                w: w.w * canvas.width,
                h: w.h * canvas.height
            }));

            walls = rawWalls.filter(w => {
                const closestX = Math.max(w.x, Math.min(startZone.x, w.x + w.w));
                const closestY = Math.max(w.y, Math.min(startZone.y, w.y + w.h));
                const distanceX = startZone.x - closestX;
                const distanceY = startZone.y - closestY;
                const distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);
                return distanceSquared > (startZone.radius * startZone.radius);
            });

            // Initialize alpha states for sonar glow effect
            wallAlphaState = walls.map(() => 0);

            goal.x = canvas.width - 50;
            goal.y = canvas.height - 50;
        }

        function showVictory() {
            messageBox.innerHTML = "<h2>Victory!</h2><p>You found your way through the darkness.</p><button onclick='location.reload()' style='cursor:pointer; padding: 10px 20px;'>Play Again</button>";
            messageBox.classList.remove('hidden');
        }

        function checkCollision(x, y) {
            for (let wall of walls) {
                if (x > wall.x && x < wall.x + wall.w && y > wall.y && y < wall.y + wall.h) {
                    return true;
                }
            }
            const borderBuffer = 2;
            if (x <= borderBuffer || x >= canvas.width - borderBuffer || y <= borderBuffer || y >= canvas.height - borderBuffer) {
                return true;
            }
            return false;
        }

        function checkGoal(x, y) {
            const dist = Math.hypot(x - goal.x, y - goal.y);
            return dist < goal.radius;
        }

        function handleDeath() {
            splats.push({ x: mousePos.x, y: mousePos.y, r: SPLAT_RADIUS + Math.random() * 5 });
            resetMouse();
        }

        function resetMouse() {
            isDead = true;
            sonarActive = false;
            messageBox.innerHTML = "<h2>You Died!</h2><p>You touched a wall or the edge.</p><p>Return to the starting area (top left).</p>";
            messageBox.classList.remove('hidden');
        }

        function handleLevelClear() {
            levelCleared = true;
            isDead = true; 
            messageBox.innerHTML = "<h2>Level Complete!</h2><p>The path is revealed! Return to the start (top left) for the next challenge.</p>";
            messageBox.classList.remove('hidden');
        }

        function update() {
            // Update Sonar state
            if (sonarCooldown > 0) {
                sonarCooldown--;
                if (sonarUnlocked && !isDead) {
                    const percent = Math.floor((1 - sonarCooldown / SONAR_COOLDOWN_TIME) * 100);
                    abilityBar.innerHTML = `<span class="sonar-charging">Sonar Recharging: ${percent}%</span>`;
                    if (sonarCooldown === 0) {
                        abilityBar.innerHTML = '<span class="sonar-ready">Sonar Ready: [Right Click]</span>';
                    }
                }
            }

            if (sonarActive) {
                sonarRadius += SONAR_SPEED;
                if (sonarRadius > SONAR_MAX_RADIUS) {
                    sonarActive = false;
                }
            }

            // Decay wall alpha (glow) over time
            for (let i = 0; i < wallAlphaState.length; i++) {
                if (wallAlphaState[i] > 0) {
                    wallAlphaState[i] -= 0.015; // Glow duration approx 1 second
                }
            }

            if (isDead) {
                const distToStart = Math.hypot(mousePos.x - startZone.x, mousePos.y - startZone.y);
                if (distToStart < startZone.radius) {
                    if (levelCleared) {
                        currentLevel++;
                        splats = []; 
                        setupLevel();
                        levelCleared = false;
                    }
                    isDead = false;
                    messageBox.classList.add('hidden');
                    if (!gameStarted) gameStarted = true;
                }
            } else if (gameStarted) {
                if (checkCollision(mousePos.x, mousePos.y)) {
                    handleDeath();
                } else if (checkGoal(mousePos.x, mousePos.y)) {
                    handleLevelClear();
                }
            }
        }

        function drawArrow(fromX, fromY, toX, toY) {
            const headlen = 15; 
            const dx = toX - fromX;
            const dy = toY - fromY;
            const angle = Math.atan2(dy, dx);
            ctx.save();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctx.fill();
            ctx.restore();
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (isDead || !gameStarted) {
                ctx.beginPath();
                ctx.arc(startZone.x, startZone.y, startZone.radius, 0, Math.PI * 2);
                ctx.strokeStyle = '#333';
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.closePath();
                ctx.setLineDash([]);
                if (isDead) {
                    drawArrow(mousePos.x, mousePos.y, startZone.x, startZone.y);
                }
            }

            // Draw Sonar Wave
            if (sonarActive) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(mousePos.x, mousePos.y, sonarRadius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(0, 150, 255, ${1 - (sonarRadius / SONAR_MAX_RADIUS)})`;
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.restore();

                // Detect walls hit by sonar
                walls.forEach((w, i) => {
                    const closestX = Math.max(w.x, Math.min(mousePos.x, w.x + w.w));
                    const closestY = Math.max(w.y, Math.min(mousePos.y, w.y + w.h));
                    const dist = Math.hypot(mousePos.x - closestX, mousePos.y - closestY);
                    
                    // If wave passes the wall, light it up
                    if (Math.abs(dist - sonarRadius) < 20) {
                        wallAlphaState[i] = 1.0;
                    }
                });
            }

            // Draw Walls (revealed by sonar or level clear)
            walls.forEach((w, i) => {
                const alpha = levelCleared ? 0.15 : wallAlphaState[i];
                if (alpha > 0) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.4})`;
                    ctx.fillRect(w.x, w.y, w.w, w.h);
                    // Glowing border
                    ctx.strokeStyle = `rgba(0, 200, 255, ${alpha})`;
                    ctx.lineWidth = 1;
                    ctx.strokeRect(w.x, w.y, w.w, w.h);
                }
            });

            ctx.fillStyle = SPLAT_COLOR;
            splats.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
                for(let i=0; i<3; i++) {
                    ctx.beginPath();
                    ctx.arc(s.x + (Math.random()-0.5)*15, s.y + (Math.random()-0.5)*15, s.r/3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            ctx.fillStyle = GOAL_COLOR;
            ctx.shadowBlur = 15;
            ctx.shadowColor = GOAL_COLOR;
            ctx.beginPath();
            ctx.arc(goal.x, goal.y, goal.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = isDead ? '#444' : '#fff';
            ctx.beginPath();
            ctx.arc(mousePos.x, mousePos.y, 4, 0, Math.PI * 2);
            ctx.fill();

            update();
            requestAnimationFrame(draw);
        }

        // Event Listeners
        window.addEventListener('mousemove', (e) => {
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;
        });

        // Trigger Sonar on Right Click
        window.addEventListener('contextmenu', (e) => {
            e.preventDefault(); // Prevent standard menu
            if (sonarUnlocked && !isDead && sonarCooldown === 0) {
                sonarActive = true;
                sonarRadius = 0;
                sonarCooldown = SONAR_COOLDOWN_TIME;
            }
        });

        window.addEventListener('resize', resize);

        window.onload = () => {
            resize();
            isDead = true; 
            draw();
        };
    </script>
</body>
</html>
