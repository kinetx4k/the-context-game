<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Maze - Find the Light</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none; /* Hide the default cursor */
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            user-select: none;
        }

        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 20px 40px;
            border: 2px solid #333;
            border-radius: 10px;
            text-align: center;
            transition: opacity 0.5s;
            z-index: 100;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        #tutorial {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        #level-indicator {
            font-size: 1.5rem;
            font-weight: bold;
            color: #444;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="level-indicator">Level 1</div>
    </div>

    <div id="message-box">
        <div id="tutorial">
            <h2>Welcome to the Darkness</h2>
            <p>Move your mouse to the <strong>green dot</strong> at the bottom right.</p>
            <p>The walls are invisible. If you touch one, you die.</p>
            <p>A <strong>red splat</strong> marks your mistakes.</p>
            <p style="color: #4CAF50;">Move your mouse here now to start.</p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        /**
         * GAME LOGIC "DARK MAZE"
         * A game about patience and spatial memory.
         */

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelIndicator = document.getElementById('level-indicator');
        const messageBox = document.getElementById('message-box');
        const tutorialText = document.getElementById('tutorial');

        // Game State
        let currentLevel = 0;
        let isDead = false;
        let gameStarted = false;
        let levelCleared = false; // New state to track if goal was reached
        let mousePos = { x: 0, y: 0 };
        let splats = []; // Stores death positions
        let walls = []; // Invisible obstacles
        let goal = { x: 0, y: 0, radius: 15 };
        let startZone = { x: 50, y: 50, radius: 40 };

        // Configuration
        const SPLAT_RADIUS = 8;
        const GOAL_COLOR = '#00FF00';
        const SPLAT_COLOR = 'rgba(200, 0, 0, 0.7)';

        /**
         * Initializes Level Data
         */
        const levels = [
            // Level 1: Tutorial - Wide path
            {
                name: "The Beginning",
                walls: [
                    { x: 0, y: 150, w: 0.7, h: 0.1 }, 
                    { x: 0.3, y: 0.4, w: 0.7, h: 0.1 } 
                ]
            },
            // Level 2: Simple Turn
            {
                name: "The First Turn",
                walls: [
                    { x: 0, y: 0.2, w: 0.8, h: 0.05 },
                    { x: 0.2, y: 0.5, w: 0.8, h: 0.05 },
                    { x: 0, y: 0.8, w: 0.8, h: 0.05 }
                ]
            },
            // Level 3: Bottleneck
            {
                name: "The Bottleneck",
                walls: [
                    { x: 0, y: 0, w: 1, h: 0.35 },
                    { x: 0, y: 0.65, w: 1, h: 0.35 },
                    { x: 0.4, y: 0.35, w: 0.2, h: 0.15 }
                ]
            },
            // Level 4: Zig-Zag
            {
                name: "Zig-Zag",
                walls: [
                    { x: 0.2, y: 0, w: 0.05, h: 0.7 },
                    { x: 0.4, y: 0.3, w: 0.05, h: 0.7 },
                    { x: 0.6, y: 0, w: 0.05, h: 0.7 },
                    { x: 0.8, y: 0.3, w: 0.05, h: 0.7 }
                ]
            },
            // Level 5: The Labyrinth
            {
                name: "The Labyrinth",
                walls: [
                    { x: 0.1, y: 0, w: 0.02, h: 0.8 },
                    { x: 0.1, y: 0.8, w: 0.4, h: 0.02 },
                    { x: 0.3, y: 0.2, w: 0.02, h: 0.6 },
                    { x: 0.3, y: 0.2, w: 0.5, h: 0.02 },
                    { x: 0.5, y: 0.4, w: 0.5, h: 0.02 },
                    { x: 0.7, y: 0.4, w: 0.02, h: 0.4 },
                    { x: 0.5, y: 0.8, w: 0.4, h: 0.02 }
                ]
            }
        ];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            setupLevel();
        }

        function setupLevel() {
            if (currentLevel >= levels.length) {
                showVictory();
                return;
            }

            const lvl = levels[currentLevel];
            levelIndicator.innerText = `Level ${currentLevel + 1}: ${lvl.name}`;
            
            // Convert relative wall coordinates to pixels
            walls = lvl.walls.map(w => ({
                x: w.x * canvas.width,
                y: w.y * canvas.height,
                w: w.w * canvas.width,
                h: w.h * canvas.height
            }));

            goal.x = canvas.width - 50;
            goal.y = canvas.height - 50;
        }

        function showVictory() {
            messageBox.innerHTML = "<h2>Victory!</h2><p>You found your way through the darkness.</p><button onclick='location.reload()' style='cursor:pointer; padding: 10px 20px;'>Play Again</button>";
            messageBox.classList.remove('hidden');
        }

        function checkCollision(x, y) {
            // Check walls
            for (let wall of walls) {
                if (x > wall.x && x < wall.x + wall.w && y > wall.y && y < wall.y + wall.h) {
                    return true;
                }
            }
            
            // Check screen edges (deadly border)
            const borderBuffer = 2;
            if (x <= borderBuffer || x >= canvas.width - borderBuffer || y <= borderBuffer || y >= canvas.height - borderBuffer) {
                return true;
            }
            
            return false;
        }

        function checkGoal(x, y) {
            const dist = Math.hypot(x - goal.x, y - goal.y);
            return dist < goal.radius;
        }

        function handleDeath() {
            // Add splat at death location
            splats.push({ x: mousePos.x, y: mousePos.y, r: SPLAT_RADIUS + Math.random() * 5 });
            
            // Back to start
            resetMouse();
        }

        function resetMouse() {
            isDead = true;
            messageBox.innerHTML = "<h2>You Died!</h2><p>You touched a wall or the edge.</p><p>Return to the starting area (top left).</p>";
            messageBox.classList.remove('hidden');
        }

        /**
         * Specialized logic for completing a level.
         * Shows the hidden path for a short duration.
         */
        function handleLevelClear() {
            levelCleared = true;
            isDead = true; 
            messageBox.innerHTML = "<h2>Level Complete!</h2><p>The path is revealed! Return to the start (top left) for the next challenge.</p>";
            messageBox.classList.remove('hidden');
        }

        function update() {
            // If dead, user must move back to the start zone (top left)
            if (isDead) {
                const distToStart = Math.hypot(mousePos.x - startZone.x, mousePos.y - startZone.y);
                if (distToStart < startZone.radius) {
                    // Transition to next level only after returning to start
                    if (levelCleared) {
                        currentLevel++;
                        splats = []; 
                        setupLevel();
                        levelCleared = false;
                    }
                    isDead = false;
                    messageBox.classList.add('hidden');
                    if (!gameStarted) gameStarted = true;
                }
            } else if (gameStarted) {
                if (checkCollision(mousePos.x, mousePos.y)) {
                    handleDeath();
                } else if (checkGoal(mousePos.x, mousePos.y)) {
                    handleLevelClear();
                }
            }
        }

        /**
         * Draws an arrow from current position to a target
         */
        function drawArrow(fromX, fromY, toX, toY) {
            const headlen = 15; // length of head in pixels
            const dx = toX - fromX;
            const dy = toY - fromY;
            const angle = Math.atan2(dy, dx);
            
            ctx.save();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
            ctx.lineWidth = 2;
            
            // Main line
            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.stroke();
            
            // Arrow head
            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctx.fill();
            
            ctx.restore();
        }

        function draw() {
            // Background
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Start Zone
            if (isDead || !gameStarted) {
                ctx.beginPath();
                ctx.arc(startZone.x, startZone.y, startZone.radius, 0, Math.PI * 2);
                ctx.strokeStyle = '#333';
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.closePath();
                ctx.setLineDash([]);

                // Draw helper arrow pointing to start when dead
                if (isDead) {
                    drawArrow(mousePos.x, mousePos.y, startZone.x, startZone.y);
                }
            }

            // Draw revealed walls if the level is cleared
            if (levelCleared) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; // Faint reveal of the path
                walls.forEach(w => {
                    ctx.fillRect(w.x, w.y, w.w, w.h);
                });
            }

            // Draw Splats (Bloodstains)
            ctx.fillStyle = SPLAT_COLOR;
            splats.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
                
                // Small splatters
                for(let i=0; i<3; i++) {
                    ctx.beginPath();
                    ctx.arc(s.x + (Math.random()-0.5)*15, s.y + (Math.random()-0.5)*15, s.r/3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // Draw Goal (Green Dot)
            ctx.fillStyle = GOAL_COLOR;
            ctx.shadowBlur = 15;
            ctx.shadowColor = GOAL_COLOR;
            ctx.beginPath();
            ctx.arc(goal.x, goal.y, goal.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw Cursor
            ctx.fillStyle = isDead ? '#444' : '#fff';
            ctx.beginPath();
            ctx.arc(mousePos.x, mousePos.y, 4, 0, Math.PI * 2);
            ctx.fill();

            update();
            requestAnimationFrame(draw);
        }

        // Event Listeners
        window.addEventListener('mousemove', (e) => {
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;
        });

        window.addEventListener('resize', resize);

        // Initialization
        window.onload = () => {
            resize();
            isDead = true; 
            draw();
        };
    </script>
</body>
</html>
