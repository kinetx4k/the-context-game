<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tron Solo Frontier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --bg-dark: #05050a;
            --bg-med: #0a0a1a;
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --grid-line: #1a1a3a;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden;
            touch-action: none;
            margin: 0;
        }

        canvas {
            image-rendering: pixelated;
            background-color: #000;
            border: 4px solid #1a1a3a;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        .pixel-panel {
            background-color: var(--bg-med);
            border: 4px solid #1a1a3a;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.8);
        }

        .btn {
            background: #1a1a3a;
            color: white;
            padding: 18px;
            border-bottom: 4px solid #000;
            transition: all 0.1s;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #2a2a4a;
            color: var(--neon-blue);
        }

        .btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        .neon-text {
            text-shadow: 0 0 10px var(--neon-blue);
            color: var(--neon-blue);
        }

        .neon-text-pink {
            text-shadow: 0 0 10px var(--neon-pink);
            color: var(--neon-pink);
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #ui-layer {
            z-index: 20;
            position: relative;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">
    <div class="scanlines"></div>

    <div id="ui-layer" class="w-full max-w-lg flex flex-col items-center">
        
        <!-- Start Menu -->
        <div id="menu" class="flex flex-col items-center gap-8 w-full">
            <div class="text-center">
                <h1 class="text-4xl neon-text mb-2 italic">TRON</h1>
                <p class="text-[10px] tracking-widest text-gray-500 font-bold uppercase">Solo Core Frontier</p>
            </div>
            
            <div class="pixel-panel p-10 w-full flex flex-col gap-6">
                <button id="startBtn" class="btn w-full text-xs neon-text font-bold">Start Simulation</button>
                <div class="text-[7px] text-center text-gray-600 leading-relaxed uppercase">
                    Defeat the AI Program<br>Avoid all Light Trails<br>Controls: WASD or Arrows
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="gameUI" class="hidden flex flex-col items-center gap-4">
            <div class="flex justify-between w-full text-[8px] text-gray-400 px-2 uppercase tracking-tighter">
                <div class="flex flex-col gap-1">
                    <span id="gameStatusLabel" class="neon-text font-bold">System Active</span>
                </div>
                <div class="text-right">
                    <span>Level: <span id="levelLabel" class="text-white">01</span></span>
                </div>
            </div>
            <div class="relative">
                <canvas id="stage"></canvas>
                <div id="countdown" class="absolute inset-0 flex items-center justify-center text-6xl neon-text pointer-events-none hidden">3</div>
            </div>
        </div>

        <!-- End Screen -->
        <div id="resultScreen" class="hidden fixed inset-0 flex items-center justify-center bg-black/80 z-[100] p-6">
            <div class="pixel-panel p-10 max-w-sm w-full text-center">
                <h2 id="winnerText" class="text-2xl mb-6">VICTORY</h2>
                <p id="winnerSub" class="text-[10px] text-gray-400 mb-8 leading-relaxed"></p>
                <button id="restartBtn" class="btn w-full text-[10px]">Restart Core</button>
            </div>
        </div>
    </div>

    <script>
        // Spiel-Konfiguration
        const TILE_SIZE = 12;
        const GRID_SIZE = 40;
        const TICK_RATE_START = 140; // Moderate Geschwindigkeit
        
        const canvas = document.getElementById('stage');
        const ctx = canvas.getContext('2d');
        canvas.width = GRID_SIZE * TILE_SIZE;
        canvas.height = GRID_SIZE * TILE_SIZE;

        // Spiel-Status
        let gameActive = false;
        let level = 1;
        let tickRate = TICK_RATE_START;
        let lastTick = 0;
        let particles = [];
        
        let player = {
            id: 'player',
            x: 5, y: 20,
            dir: { x: 1, y: 0 },
            nextDir: { x: 1, y: 0 },
            alive: true,
            trail: [],
            color: '#00f2ff'
        };

        let ai = {
            id: 'ai',
            x: 34, y: 20,
            dir: { x: -1, y: 0 },
            nextDir: { x: -1, y: 0 },
            alive: true,
            trail: [],
            color: '#ff00ea'
        };

        // Steuerung
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || e.key === 'ArrowUp') { if (player.dir.y === 0) player.nextDir = { x: 0, y: -1 }; }
            if (key === 's' || e.key === 'ArrowDown') { if (player.dir.y === 0) player.nextDir = { x: 0, y: 1 }; }
            if (key === 'a' || e.key === 'ArrowLeft') { if (player.dir.x === 0) player.nextDir = { x: -1, y: 0 }; }
            if (key === 'd' || e.key === 'ArrowRight') { if (player.dir.x === 0) player.nextDir = { x: 1, y: 0 }; }
        });

        function resetSimulation() {
            player.x = 5; player.y = 20;
            player.dir = { x: 1, y: 0 };
            player.nextDir = { x: 1, y: 0 };
            player.alive = true;
            player.trail = [];

            ai.x = 34; ai.y = 20;
            ai.dir = { x: -1, y: 0 };
            ai.nextDir = { x: -1, y: 0 };
            ai.alive = true;
            ai.trail = [];
            
            particles = [];
            tickRate = Math.max(80, TICK_RATE_START - (level * 5));
        }

        // Einfache KI-Logik
        function updateAI() {
            if (!ai.alive) return;

            const checkX = ai.x + ai.dir.x;
            const checkY = ai.y + ai.dir.y;

            // Prüfen, ob der nächste Schritt gefährlich ist
            if (isCollision(checkX, checkY)) {
                const possibleDirs = [
                    { x: 0, y: -1 }, { x: 0, y: 1 }, 
                    { x: -1, y: 0 }, { x: 1, y: 0 }
                ];
                
                // Nur Richtungen wählen, die nicht direkt rückwärts sind
                const safeDirs = possibleDirs.filter(d => {
                    if (d.x === -ai.dir.x && d.y === -ai.dir.y) return false;
                    return !isCollision(ai.x + d.x, ai.y + d.y);
                });

                if (safeDirs.length > 0) {
                    ai.dir = safeDirs[Math.floor(Math.random() * safeDirs.length)];
                }
            }
        }

        function isCollision(x, y) {
            // Wände
            if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) return true;
            // Trails
            if (player.trail.some(t => t.x === x && t.y === y)) return true;
            if (ai.trail.some(t => t.x === x && t.y === y)) return true;
            // Köpfe
            if (player.x === x && player.y === y) return true;
            if (ai.x === x && ai.y === y) return true;
            return false;
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 25; i++) {
                particles.push({
                    x: x + TILE_SIZE / 2,
                    y: y + TILE_SIZE / 2,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1.0,
                    color: color
                });
            }
        }

        async function tick() {
            if (!gameActive) return;

            // Spieler bewegen
            player.dir = player.nextDir;
            const pNextX = player.x + player.dir.x;
            const pNextY = player.y + player.dir.y;

            if (isCollision(pNextX, pNextY)) {
                player.alive = false;
                createExplosion(player.x * TILE_SIZE, player.y * TILE_SIZE, player.color);
                endSimulation();
                return;
            }

            player.trail.push({ x: player.x, y: player.y });
            player.x = pNextX;
            player.y = pNextY;

            // KI bewegen
            updateAI();
            const aiNextX = ai.x + ai.dir.x;
            const aiNextY = ai.y + ai.dir.y;

            if (isCollision(aiNextX, aiNextY)) {
                ai.alive = false;
                createExplosion(ai.x * TILE_SIZE, ai.y * TILE_SIZE, ai.color);
                endSimulation();
                return;
            }

            ai.trail.push({ x: ai.x, y: ai.y });
            ai.x = aiNextX;
            ai.y = aiNextY;
        }

        function endSimulation() {
            gameActive = false;
            const result = document.getElementById('resultScreen');
            const title = document.getElementById('winnerText');
            const sub = document.getElementById('winnerSub');
            
            result.classList.remove('hidden');
            if (!player.alive && !ai.alive) {
                title.innerText = "DRAW";
                title.className = "text-2xl mb-6 text-gray-400";
                sub.innerText = "BOTH PROGRAMS DEREZZED SIMULTANEOUSLY.";
            } else if (!player.alive) {
                title.innerText = "DEFEAT";
                title.className = "text-2xl mb-6 neon-text-pink";
                sub.innerText = "YOUR PROGRAM HAS BEEN OVERWRITTEN BY THE AI.";
            } else {
                title.innerText = "VICTORY";
                title.className = "text-2xl mb-6 neon-text";
                sub.innerText = "AI PROGRAM DEREZZED. SECTOR SECURED.";
                level++;
                document.getElementById('levelLabel').innerText = level.toString().padStart(2, '0');
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Raster zeichnen
            ctx.strokeStyle = '#050515';
            ctx.lineWidth = 1;
            for (let i = 0; i < GRID_SIZE; i++) {
                ctx.beginPath(); ctx.moveTo(i * TILE_SIZE, 0); ctx.lineTo(i * TILE_SIZE, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * TILE_SIZE); ctx.lineTo(canvas.width, i * TILE_SIZE); ctx.stroke();
            }

            // Trails und Köpfe zeichnen
            [player, ai].forEach(p => {
                ctx.strokeStyle = p.color;
                ctx.lineWidth = 4;
                ctx.lineCap = 'square';
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.color;

                if (p.trail.length > 0) {
                    ctx.beginPath();
                    ctx.moveTo(p.trail[0].x * TILE_SIZE + TILE_SIZE / 2, p.trail[0].y * TILE_SIZE + TILE_SIZE / 2);
                    p.trail.forEach(t => {
                        ctx.lineTo(t.x * TILE_SIZE + TILE_SIZE / 2, t.y * TILE_SIZE + TILE_SIZE / 2);
                    });
                    ctx.lineTo(p.x * TILE_SIZE + TILE_SIZE / 2, p.y * TILE_SIZE + TILE_SIZE / 2);
                    ctx.stroke();
                }

                if (p.alive) {
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 20;
                    ctx.fillRect(p.x * TILE_SIZE + 2, p.y * TILE_SIZE + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                }
                ctx.shadowBlur = 0;
            });

            // Partikel zeichnen
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 2, 2);
                ctx.globalAlpha = 1.0;
                return p.life > 0;
            });
        }

        function gameLoop(now) {
            if (gameActive && now - lastTick > tickRate) {
                tick();
                lastTick = now;
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        // UI Event-Handler
        document.getElementById('startBtn').onclick = () => {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('gameUI').classList.remove('hidden');
            resetSimulation();
            gameActive = true;
            requestAnimationFrame(gameLoop);
        };

        document.getElementById('restartBtn').onclick = () => {
            document.getElementById('resultScreen').classList.add('hidden');
            resetSimulation();
            gameActive = true;
        };

    </script>
</body>
</html>
