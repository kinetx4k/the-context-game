<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Simulator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        .ui-panel {
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .custom-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #333;
            outline: none;
            border-radius: 2px;
        }
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #007bff;
            cursor: pointer;
            border-radius: 50%;
        }
        .btn-active {
            background-color: #007bff !important;
            color: white !important;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #888;
        }
        .stat-value {
            font-size: 0.9rem;
            font-weight: bold;
            color: #fff;
        }
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 280px;
            padding: 20px;
            z-index: 100;
        }
        #stats {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 15px;
            z-index: 100;
        }
        #instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 15px;
            font-size: 0.85rem;
            pointer-events: none;
        }
        .object-type-btn {
            transition: all 0.2s;
        }
        #velocity-line {
            pointer-events: none;
            position: absolute;
            display: none;
            border-top: 2px dashed rgba(255, 255, 255, 0.5);
            transform-origin: left center;
        }
    </style>
</head>
<body>

    <div id="controls" class="ui-panel space-y-4">
        <h1 class="text-xl font-bold border-bottom pb-2 mb-4 border-gray-700">Universe Engine</h1>
        
        <div class="space-y-2">
            <label class="text-sm">Object Type</label>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="setObjectType('planet')" id="btn-planet" class="object-type-btn p-2 rounded bg-gray-800 text-xs hover:bg-gray-700 btn-active">Planet</button>
                <button onclick="setObjectType('star')" id="btn-star" class="object-type-btn p-2 rounded bg-gray-800 text-xs hover:bg-gray-700">Star</button>
                <button onclick="setObjectType('comet')" id="btn-comet" class="object-type-btn p-2 rounded bg-gray-800 text-xs hover:bg-gray-700">Comet</button>
            </div>
        </div>

        <div class="space-y-4 pt-2">
            <div>
                <div class="flex justify-between text-xs mb-1">
                    <span>Gravity (G)</span>
                    <span id="g-val">1.0</span>
                </div>
                <input type="range" min="0" max="5" step="0.1" value="1" class="custom-slider" id="input-g">
            </div>
            
            <div>
                <div class="flex justify-between text-xs mb-1">
                    <span>Simulation Speed</span>
                    <span id="speed-val">1.0</span>
                </div>
                <input type="range" min="0" max="3" step="0.1" value="1" class="custom-slider" id="input-speed">
            </div>
        </div>

        <div class="flex items-center space-x-2 py-2">
            <input type="checkbox" id="show-trails" checked>
            <label for="show-trails" class="text-xs">Show Orbit Trails</label>
        </div>
        
        <div class="flex items-center space-x-2 py-1">
            <input type="checkbox" id="show-grid" checked>
            <label for="show-grid" class="text-xs">Show Grid</label>
        </div>

        <div class="grid grid-cols-2 gap-2 mt-4">
            <button onclick="clearSystem()" class="p-2 rounded bg-red-900/40 hover:bg-red-800/60 text-xs border border-red-700/50">Clear All</button>
            <button onclick="resetView()" class="p-2 rounded bg-gray-800 hover:bg-gray-700 text-xs">Reset View</button>
        </div>
    </div>

    <div id="stats" class="ui-panel grid grid-cols-2 gap-x-4 gap-y-2">
        <div class="flex flex-col">
            <span class="stat-label">Objects</span>
            <span id="stat-count" class="stat-value">0</span>
        </div>
        <div class="flex flex-col">
            <span class="stat-label">Total Mass</span>
            <span id="stat-mass" class="stat-value">0</span>
        </div>
    </div>

    <div id="instructions" class="ui-panel opacity-50">
        <p>• Click and Drag: Launch object</p>
        <p>• Mouse Wheel: Zoom in/out</p>
        <p>• Right Click + Drag: Pan view</p>
        <p>• C: Clear System</p>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const G_INPUT = document.getElementById('input-g');
        const SPEED_INPUT = document.getElementById('input-speed');
        const G_VAL = document.getElementById('g-val');
        const SPEED_VAL = document.getElementById('speed-val');
        const SHOW_TRAILS = document.getElementById('show-trails');
        const SHOW_GRID = document.getElementById('show-grid');
        const STAT_COUNT = document.getElementById('stat-count');
        const STAT_MASS = document.getElementById('stat-mass');

        // Simulation State
        let G = 1.0;
        let timeStep = 1.0;
        let objects = [];
        let currentType = 'planet';
        let isDragging = false;
        let isPanning = false;
        let startPos = { x: 0, y: 0 };
        let currentMousePos = { x: 0, y: 0 };
        
        // Camera View State
        let camera = {
            x: 0,
            y: 0,
            zoom: 1,
            targetZoom: 1
        };

        const types = {
            planet: { mass: 100, radius: 8, color: '#4a90e2', trailColor: 'rgba(74, 144, 226, 0.3)' },
            star: { mass: 10000, radius: 20, color: '#f5a623', trailColor: 'rgba(245, 166, 35, 0.3)' },
            comet: { mass: 5, radius: 3, color: '#ffffff', trailColor: 'rgba(255, 255, 255, 0.3)' }
        };

        // Resize handler
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            camera.x = canvas.width / 2;
            camera.y = canvas.height / 2;
        }

        window.addEventListener('resize', resize);
        resize();

        // UI Helpers
        function setObjectType(type) {
            currentType = type;
            document.querySelectorAll('.object-type-btn').forEach(btn => btn.classList.remove('btn-active'));
            document.getElementById(`btn-${type}`).classList.add('btn-active');
        }

        function clearSystem() {
            objects = [];
        }

        function resetView() {
            camera.zoom = 1;
            camera.targetZoom = 1;
            camera.x = canvas.width / 2;
            camera.y = canvas.height / 2;
        }

        // Math Helpers
        function screenToWorld(x, y) {
            return {
                x: (x - camera.x) / camera.zoom,
                y: (y - camera.y) / camera.zoom
            };
        }

        class CelestialBody {
            constructor(x, y, vx, vy, type) {
                const config = types[type];
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.mass = config.mass;
                this.radius = config.radius;
                this.color = config.color;
                this.trailColor = config.trailColor;
                this.type = type;
                this.trail = [];
                this.maxTrail = 200;
                this.destroyed = false;
            }

            update() {
                this.x += this.vx * timeStep;
                this.y += this.vy * timeStep;

                if (SHOW_TRAILS.checked) {
                    this.trail.push({ x: this.x, y: this.y });
                    if (this.trail.length > this.maxTrail) this.trail.shift();
                } else {
                    this.trail = [];
                }
            }

            draw() {
                // Draw Trail
                if (SHOW_TRAILS.checked && this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.strokeStyle = this.trailColor;
                    ctx.lineWidth = 1 / camera.zoom;
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let p of this.trail) {
                        ctx.lineTo(p.x, p.y);
                    }
                    ctx.stroke();
                }

                // Draw Glow
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 2);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.globalAlpha = 0.4;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;

                // Draw Core
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Details for specific types
                if (this.type === 'star') {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = this.color;
                } else {
                    ctx.shadowBlur = 0;
                }
            }
        }

        // Physics Logic
        function applyGravity() {
            for (let i = 0; i < objects.length; i++) {
                for (let j = i + 1; j < objects.length; j++) {
                    const b1 = objects[i];
                    const b2 = objects[j];

                    const dx = b2.x - b1.x;
                    const dy = b2.y - b1.y;
                    const distSq = dx * dx + dy * dy;
                    const dist = Math.sqrt(distSq);

                    // Collision check
                    if (dist < (b1.radius + b2.radius)) {
                        handleCollision(b1, b2);
                        continue;
                    }

                    const force = (G * b1.mass * b2.mass) / distSq;
                    const ax = (force * dx / dist) / b1.mass;
                    const ay = (force * dy / dist) / b1.mass;

                    b1.vx += ax * timeStep;
                    b1.vy += ay * timeStep;

                    b2.vx -= (ax * b1.mass / b2.mass) * timeStep;
                    b2.vy -= (ay * b1.mass / b2.mass) * timeStep;
                }
            }
            // Cleanup destroyed objects
            objects = objects.filter(o => !o.destroyed);
        }

        function handleCollision(b1, b2) {
            // Merging logic: smaller gets absorbed by larger
            if (b1.mass >= b2.mass) {
                absorb(b1, b2);
            } else {
                absorb(b2, b1);
            }
        }

        function absorb(winner, loser) {
            // Momentum conservation: m1v1 + m2v2 = (m1+m2)v3
            const totalMass = winner.mass + loser.mass;
            winner.vx = (winner.vx * winner.mass + loser.vx * loser.mass) / totalMass;
            winner.vy = (winner.vy * winner.mass + loser.vy * loser.mass) / totalMass;
            
            winner.mass = totalMass;
            // Radius grows sub-linearly (volume-based growth roughly)
            winner.radius = Math.max(winner.radius, Math.pow(totalMass, 1/3) * 2);
            
            loser.destroyed = true;
        }

        // Drawing Trajectory Prediction
        function drawPrediction() {
            if (!isDragging) return;

            const worldStart = screenToWorld(startPos.x, startPos.y);
            const worldEnd = screenToWorld(currentMousePos.x, currentMousePos.y);
            
            // Launch vector
            const vx = (worldStart.x - worldEnd.x) * 0.05;
            const vy = (worldStart.y - worldEnd.y) * 0.05;

            // Temp object for simulation
            let tempObj = {
                x: worldStart.x,
                y: worldStart.y,
                vx: vx,
                vy: vy,
                mass: types[currentType].mass,
                radius: types[currentType].radius
            };

            ctx.beginPath();
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.moveTo(tempObj.x, tempObj.y);

            // Simulate forward for 150 steps
            for (let i = 0; i < 150; i++) {
                // Simple Euler for prediction
                for (let other of objects) {
                    const dx = other.x - tempObj.x;
                    const dy = other.y - tempObj.y;
                    const d2 = dx * dx + dy * dy;
                    if (d2 < 100) continue; 
                    const f = (G * tempObj.mass * other.mass) / d2;
                    tempObj.vx += (f * dx / Math.sqrt(d2) / tempObj.mass) * timeStep;
                    tempObj.vy += (f * dy / Math.sqrt(d2) / tempObj.mass) * timeStep;
                }
                tempObj.x += tempObj.vx * timeStep;
                tempObj.y += tempObj.vy * timeStep;

                if (i % 5 === 0) ctx.lineTo(tempObj.x, tempObj.y);
            }
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw current vector line
            ctx.beginPath();
            ctx.strokeStyle = types[currentType].color;
            ctx.lineWidth = 2 / camera.zoom;
            ctx.moveTo(worldStart.x, worldStart.y);
            ctx.lineTo(worldEnd.x, worldEnd.y);
            ctx.stroke();
        }

        function drawBackground() {
            // Draw Stars
            ctx.fillStyle = "#fff";
            // We use a fixed seed-like pattern for background stars based on coordinates
            // (In a real game these would be static sprites)
        }

        function drawGrid() {
            if (!SHOW_GRID.checked) return;

            const gridSize = 100;
            const scaledGridSize = gridSize;
            
            ctx.beginPath();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
            ctx.lineWidth = 1 / camera.zoom;

            // Simple infinite grid calculation
            const left = ( -camera.x / camera.zoom );
            const top = ( -camera.y / camera.zoom );
            const right = ( (canvas.width - camera.x) / camera.zoom );
            const bottom = ( (canvas.height - camera.y) / camera.zoom );

            for (let x = Math.floor(left / gridSize) * gridSize; x < right; x += gridSize) {
                ctx.moveTo(x, top);
                ctx.lineTo(x, bottom);
            }
            for (let y = Math.floor(top / gridSize) * gridSize; y < bottom; y += gridSize) {
                ctx.moveTo(left, y);
                ctx.lineTo(right, y);
            }
            ctx.stroke();

            // Center axis
            ctx.beginPath();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
            ctx.moveTo(0, top); ctx.lineTo(0, bottom);
            ctx.moveTo(left, 0); ctx.lineTo(right, 0);
            ctx.stroke();
        }

        // Input Events
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                isDragging = true;
                startPos = { x: e.clientX, y: e.clientY };
                currentMousePos = { x: e.clientX, y: e.clientY };
            } else if (e.button === 2) {
                isPanning = true;
                startPos = { x: e.clientX, y: e.clientY };
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                currentMousePos = { x: e.clientX, y: e.clientY };
            }
            if (isPanning) {
                const dx = e.clientX - startPos.x;
                const dy = e.clientY - startPos.y;
                camera.x += dx;
                camera.y += dy;
                startPos = { x: e.clientX, y: e.clientY };
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button === 0 && isDragging) {
                const worldStart = screenToWorld(startPos.x, startPos.y);
                const worldEnd = screenToWorld(e.clientX, e.clientY);
                
                // Velocity is proportional to drag length
                const vx = (worldStart.x - worldEnd.x) * 0.05;
                const vy = (worldStart.y - worldEnd.y) * 0.05;

                objects.push(new CelestialBody(worldStart.x, worldStart.y, vx, vy, currentType));
                isDragging = false;
            }
            if (e.button === 2) {
                isPanning = false;
            }
        });

        canvas.addEventListener('wheel', (e) => {
            const zoomSpeed = 0.001;
            const delta = -e.deltaY;
            const factor = Math.pow(1.1, delta / 100);
            
            // Zoom at mouse position
            const mouseWorldBefore = screenToWorld(e.clientX, e.clientY);
            camera.zoom *= factor;
            camera.zoom = Math.max(0.01, Math.min(10, camera.zoom));
            const mouseWorldAfter = screenToWorld(e.clientX, e.clientY);
            
            camera.x += (mouseWorldAfter.x - mouseWorldBefore.x) * camera.zoom;
            camera.y += (mouseWorldAfter.y - mouseWorldBefore.y) * camera.zoom;
            
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'c') clearSystem();
        });

        // Prevent Context Menu
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        // Main Loop
        function loop() {
            // Update constants from UI
            G = parseFloat(G_INPUT.value);
            timeStep = parseFloat(SPEED_INPUT.value);
            G_VAL.innerText = G.toFixed(1);
            SPEED_VAL.innerText = timeStep.toFixed(1);

            // Physics
            applyGravity();
            for (let obj of objects) {
                obj.update();
            }

            // Stats
            STAT_COUNT.innerText = objects.length;
            const totalMass = objects.reduce((sum, o) => sum + o.mass, 0);
            STAT_MASS.innerText = Math.round(totalMass).toLocaleString();

            // Render
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // World space transformations
            ctx.translate(camera.x, camera.y);
            ctx.scale(camera.zoom, camera.zoom);

            drawGrid();

            for (let obj of objects) {
                obj.draw();
            }

            drawPrediction();

            requestAnimationFrame(loop);
        }

        // Start
        window.onload = loop;

    </script>
</body>
</html>
