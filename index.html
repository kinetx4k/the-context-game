<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Maze - Procedural</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            user-select: none;
            z-index: 10;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 30px;
            border: 2px solid #333;
            border-radius: 15px;
            text-align: center;
            z-index: 50;
            pointer-events: auto;
        }

        #ability-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 20px;
        }

        .sonar-ready { color: #00FF00; font-weight: bold; text-shadow: 0 0 10px #00FF00; }
        .sonar-charging { color: #ff4444; }
        
        .btn-main {
            margin-top: 20px;
            padding: 10px 25px;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="level-indicator">Level 1</div>
    </div>

    <div id="ability-bar"></div>

    <div id="message-box" class="hidden">
        <div id="msg-content"></div>
        <button class="btn-main" id="msg-btn">Continue</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="module">
        // Constants & Config
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const SONAR_COOLDOWN_TIME = 600; // 10 seconds at 60fps
        const SONAR_MAX_RADIUS = 1000;
        const SONAR_SPEED = 12;
        const SPLAT_COLOR = 'rgba(200, 0, 0, 0.8)';
        const GOAL_COLOR = '#00FF00';

        // Game State
        let currentLevel = 1;
        let isDead = true;
        let gameStarted = false;
        let levelCleared = false;
        let mousePos = { x: 50, y: 50 };
        let splats = [];
        let walls = [];
        let goal = { x: 0, y: 0, radius: 20 };
        let startZone = { x: 60, y: 60, radius: 45 };
        
        // Sonar
        let sonarActive = false;
        let sonarRadius = 0;
        let sonarCooldown = 0;
        let wallAlphaState = [];

        /**
         * Maze Generation Algorithm (Recursive Backtracker)
         */
        function generateMaze(level) {
            const complexity = 4 + Math.floor(level / 2);
            const cols = complexity;
            const rows = complexity;
            
            const mazeGrid = Array.from({ length: rows }, () => Array(cols).fill(true));
            const visited = Array.from({ length: rows }, () => Array(cols).fill(false));

            function carve(r, c) {
                visited[r][c] = true;
                mazeGrid[r][c] = false;

                const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]].sort(() => Math.random() - 0.5);

                for (const [dr, dc] of dirs) {
                    const nr = r + dr;
                    const nc = c + dc;
                    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !visited[nr][nc]) {
                        let neighbors = 0;
                        if (nr > 0 && !mazeGrid[nr-1][nc]) neighbors++;
                        if (nr < rows-1 && !mazeGrid[nr+1][nc]) neighbors++;
                        if (nc > 0 && !mazeGrid[nr][nc-1]) neighbors++;
                        if (nc < cols-1 && !mazeGrid[nr][nc+1]) neighbors++;

                        if (neighbors <= 1) {
                            carve(nr, nc);
                        }
                    }
                }
            }

            carve(0, 0);
            mazeGrid[rows-1][cols-1] = false;
            
            const w = canvas.width / cols;
            const h = canvas.height / rows;
            const newWalls = [];

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (mazeGrid[r][c]) {
                        newWalls.push({
                            x: c * w,
                            y: r * h,
                            w: w,
                            h: h
                        });
                    }
                }
            }

            return newWalls.filter(wall => {
                const startX = Math.max(wall.x, Math.min(startZone.x, wall.x + wall.w));
                const startY = Math.max(wall.y, Math.min(startZone.y, wall.y + wall.h));
                const startDist = Math.hypot(startZone.x - startX, startZone.y - startY);
                
                const goalXPos = canvas.width - 60;
                const goalYPos = canvas.height - 60;
                const goalX = Math.max(wall.x, Math.min(goalXPos, wall.x + wall.w));
                const goalY = Math.max(wall.y, Math.min(goalYPos, wall.y + wall.h));
                const goalDist = Math.hypot(goalXPos - goalX, goalYPos - goalY);

                return startDist > startZone.radius && goalDist > 60;
            });
        }

        function setupLevel() {
            document.getElementById('level-indicator').innerText = `Level ${currentLevel}`;
            walls = generateMaze(currentLevel);
            wallAlphaState = walls.map(() => 0);
            goal.x = canvas.width - 60;
            goal.y = canvas.height - 60;
            splats = [];
            levelCleared = false;
            resetMouse("Level Start");
        }

        function resetMouse(msg) {
            isDead = true;
            sonarActive = false;
            const content = document.getElementById('msg-content');
            if (msg === "Level Start") {
                content.innerHTML = `<h2>Level ${currentLevel}</h2><p>Move to the start circle (top left) to begin.</p>`;
            } else if (levelCleared) {
                content.innerHTML = `<h2>Level Complete!</h2><p>Excellent memory. Move back to the start to advance.</p>`;
            } else {
                content.innerHTML = `<h2>You Died!</h2><p>The darkness claimed you. Return to the start circle.</p>`;
            }
            document.getElementById('message-box').classList.remove('hidden');
        }

        function checkCollision(x, y) {
            for (let wall of walls) {
                if (x > wall.x && x < wall.x + wall.w && y > wall.y && y < wall.y + wall.h) return true;
            }
            const b = 3;
            if (x < b || x > canvas.width - b || y < b || y > canvas.height - b) return true;
            return false;
        }

        function update() {
            if (sonarCooldown > 0) {
                sonarCooldown--;
                const bar = document.getElementById('ability-bar');
                if (sonarCooldown === 0) {
                    bar.innerHTML = '<span class="sonar-ready">Sonar Ready [Right Click]</span>';
                } else {
                    const sec = Math.ceil(sonarCooldown / 60);
                    bar.innerHTML = `<span class="sonar-charging">Sonar Recharging: ${sec}s</span>`;
                }
            }

            if (sonarActive) {
                sonarRadius += SONAR_SPEED;
                if (sonarRadius > SONAR_MAX_RADIUS) sonarActive = false;
                walls.forEach((w, i) => {
                    const cx = Math.max(w.x, Math.min(mousePos.x, w.x + w.w));
                    const cy = Math.max(w.y, Math.min(mousePos.y, w.y + w.h));
                    if (Math.abs(Math.hypot(mousePos.x - cx, mousePos.y - cy) - sonarRadius) < 30) {
                        wallAlphaState[i] = 1.0;
                    }
                });
            }

            wallAlphaState = wallAlphaState.map(a => Math.max(0, a - 0.012));

            if (isDead) {
                const dist = Math.hypot(mousePos.x - startZone.x, mousePos.y - startZone.y);
                if (dist < startZone.radius) {
                    if (levelCleared) {
                        currentLevel++;
                        setupLevel();
                    }
                    isDead = false;
                    document.getElementById('message-box').classList.add('hidden');
                    gameStarted = true;
                }
            } else if (gameStarted) {
                if (checkCollision(mousePos.x, mousePos.y)) {
                    splats.push({ x: mousePos.x, y: mousePos.y, r: 10 + Math.random() * 8 });
                    resetMouse("Dead");
                } else if (Math.hypot(mousePos.x - goal.x, mousePos.y - goal.y) < goal.radius) {
                    levelCleared = true;
                    resetMouse("Win");
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (isDead) {
                ctx.beginPath();
                ctx.arc(startZone.x, startZone.y, startZone.radius, 0, Math.PI * 2);
                ctx.strokeStyle = '#333';
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
                
                const dx = startZone.x - mousePos.x;
                const dy = startZone.y - mousePos.y;
                const angle = Math.atan2(dy, dx);
                ctx.save();
                ctx.translate(mousePos.x, mousePos.y);
                ctx.rotate(angle);
                ctx.beginPath();
                ctx.moveTo(30, 0); ctx.lineTo(15, -8); ctx.lineTo(15, 8); ctx.closePath();
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fill();
                ctx.restore();
            }

            if (sonarActive) {
                ctx.beginPath();
                ctx.arc(mousePos.x, mousePos.y, sonarRadius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(0, 200, 255, ${1 - (sonarRadius / SONAR_MAX_RADIUS)})`;
                ctx.lineWidth = 4;
                ctx.stroke();
            }

            walls.forEach((w, i) => {
                const alpha = levelCleared ? 0.2 : wallAlphaState[i];
                if (alpha > 0) {
                    ctx.fillStyle = `rgba(100, 100, 100, ${alpha * 0.3})`;
                    ctx.fillRect(w.x, w.y, w.w, w.h);
                    ctx.strokeStyle = `rgba(0, 255, 255, ${alpha})`;
                    ctx.lineWidth = 1;
                    ctx.strokeRect(w.x, w.y, w.w, w.h);
                }
            });

            ctx.fillStyle = SPLAT_COLOR;
            splats.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.fillStyle = GOAL_COLOR;
            ctx.shadowBlur = levelCleared ? 0 : 20;
            ctx.shadowColor = GOAL_COLOR;
            ctx.beginPath();
            ctx.arc(goal.x, goal.y, goal.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = isDead ? '#444' : '#fff';
            ctx.beginPath();
            ctx.arc(mousePos.x, mousePos.y, 5, 0, Math.PI * 2);
            ctx.fill();

            update();
            requestAnimationFrame(draw);
        }

        window.addEventListener('mousemove', e => {
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;
        });

        window.addEventListener('contextmenu', e => {
            e.preventDefault();
            if (sonarCooldown === 0 && !isDead) {
                sonarActive = true;
                sonarRadius = 0;
                sonarCooldown = SONAR_COOLDOWN_TIME;
            }
        });

        document.getElementById('msg-btn').onclick = () => {
            document.getElementById('message-box').classList.add('hidden');
        };

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            setupLevel();
        });

        // Initialize Start
        window.onload = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            setupLevel();
            draw();
        };

    </script>
</body>
</html>
